<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Famcode - Matches</title>
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<meta
name="referrer"
content="no-referrer"/>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>
<script src="proxyurl.js"></script>
<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#playerWrap{
width:100%;
height:100%;
display:none;
}

video{
width:100%;
height:100%;
background:#000;
}

.plyr{
height:100%;
}

.loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:999;
}

.loader{
width:45px;
height:45px;
border:4px solid #333;
border-top:4px solid red;
border-radius:50%;
margin:auto;
margin-bottom:15px;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.small{
font-size:13px;
color:#aaa;
margin-top:8px;
}

</style>
</head>
<body>
<div
id="loading"
class="loading">
<div class="loader"></div>
<div>
Checking location...
</div>
<div class="small">
Preparing player
</div>
</div>
<div id="playerWrap">
<video
id="player"
autoplay
muted
controls
crossorigin
playsinline>
</video>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
<script>
const params=
new URLSearchParams(location.search);
const id=
params.get("id");
const video=
document.getElementById("player");
const loading=
document.getElementById("loading");

async function detectCountry(){
try{
const r=
await fetch(
"https://ip.lchd-football.workers.dev?t="+Date.now(),
{
cache:"no-store"
}
);

const data=
await r.json();
return(
data.country||
"UNKNOWN"
)
.trim()
.toUpperCase();
}
catch(e){
return "UNKNOWN";
}
}

async function startWorldPlayer(){
const matchId=
id.split("_")[0];

const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const json=
await res.json();

const match=
json.matches.find(
m=>
String(m.match_id)
===matchId
);

if(!match){
loading.innerHTML=
"Match not found";
return;
}

const auto=
match?.auto_streams?.[0]?.auto;
if(!auto){
loading.innerHTML=
"No stream";
return;
}

const found=
auto.match(
/https:\/\/[^\n]+?(240|360|480|540|720|1080)p\.m3u8[^\n]*/i
);

if(!found){
loading.innerHTML=
"Stream unavailable";
return;
}

let stream=
found[0].trim();
stream=
stream.replace(
/(240|360|480|540|720|1080)p\.m3u8/i,
"index.m3u8"
);

stream=
stream.replace(
/https:\/\/[^/]+\/mumbai/i,
PROXY_URL+"/mumbai"
);

loading.style.display=
"none";
document
.getElementById(
"playerWrap"
)
.style.display=
"block";

if(Hls.isSupported()){
const hls=
new Hls({
maxMaxBufferLength:100
});

hls.loadSource(stream);
hls.attachMedia(video);
hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{
const qualities=[
...new Set(
hls.levels
.map(
l=>l.height
)
.filter(Boolean)
)
]
.sort(
(a,b)=>b-a
);

qualities.unshift(0);
new Plyr(
video,
{
controls:[
'play-large',
'play',
'mute',
'volume',
'settings',
'fullscreen'
],
settings:[
'quality'
],
quality:{
default:0,
options:qualities,
forced:true,
onChange:
quality=>{
if(
quality===0
){
hls.currentLevel=-1;
return;
}
hls.levels.forEach(
(level,index)=>{
if(
level.height===quality
){
hls.currentLevel=index;
}
});
}
},
i18n:{
qualityLabel:{
0:"Auto"
}
}
}
);
});
}
}

setTimeout(
async()=>{
const country=
await detectCountry();
if(country==="IN"){

document.body.innerHTML=`
<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
">

<div style="
width:92%;
max-width:360px;
background:linear-gradient(180deg,#171717,#111);
padding:28px;
border-radius:28px;
text-align:center;
border:3px solid #ff2020;
box-shadow:
0 0 25px rgba(255,0,0,.25);
">

<div style="
font-size:30px;
margin-bottom:14px;
">
🇮🇳
</div>

<h2 style="
margin:0;
font-size:28px;
color:#ff4d4d;
font-weight:700;
">
Your location is India
</h2>
<p style="
color:#bdbdbd;
font-size:15px;
line-height:1.5;
margin-top:14px;
margin-bottom:28px;
">
Worldwide stream unavailable.<br>
Return to homepage.
</p>

<a
href="index.html"
style="
display:block;
background:#ff0000;
padding:16px;
border-radius:16px;
color:#fff;
font-size:20px;
font-weight:700;
text-decoration:none;
box-shadow:
0 0 15px rgba(255,0,0,.35);
">
⬅ Back Home
</a>
</div>
</div>
`;
return;
}
startWorldPlayer();
},1500);

</script>
</body>
</html>

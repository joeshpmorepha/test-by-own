<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Player</title>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<meta
name="referrer"
content="no-referrer"/>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<script src="proxyurl.js"></script>

<style>

html,body{
margin:0;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#player{
width:100%;
height:100%;
display:none;
}

video{
width:100%;
height:100%;
background:#000;
}

.loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:9999;
}

.loader{
width:45px;
height:45px;
border:4px solid #333;
border-top:4px solid red;
border-radius:50%;
margin:auto;
margin-bottom:15px;
animation:spin .9s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.small{
font-size:13px;
color:#aaa;
margin-top:8px;
}

</style>

</head>

<body>

<div
id="loading"
class="loading">

<div class="loader"></div>

<div>
Checking location...
</div>

<div class="small">
Preparing player
</div>

</div>


<div id="player">

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>


<script>

const params=
new URLSearchParams(
location.search
);

const id=
params.get("id");

const video=
document.getElementById(
"video"
);


// OLD WORKING DETECTION

setTimeout(()=>{

fetch(
"https://ipapi.co/json/?t="+Date.now()
)

.then(
r=>r.json()
)

.then(
async geo=>{

const country=
(
geo.country_code||
""
)
.toUpperCase();

console.log(
"Country:",
country
);


// INDIA

if(country==="IN"){

document.body.innerHTML=`

<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
">

<div style="
background:#171717;
padding:25px;
width:90%;
max-width:340px;
border-radius:20px;
text-align:center;
">

<h2>

Your location is India

</h2>

<p style="
color:#aaa
">

Use Indian Users Button

</p>

<a
href="javascript:history.back()"

style="
display:block;
margin-top:20px;
background:red;
padding:14px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
">

Watch Now - Indian Users

</a>

</div>

</div>

`;

return;

}


// WORLD

const matchId=
id.split("_")[0];


const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const json=
await res.json();


const match=
json.matches.find(
m=>

String(
m.match_id
)

===matchId
);


if(!match){

document.getElementById(
"loading"
).innerHTML=
"Match not found";

return;

}


const auto=

match
?.auto_streams?.[0]
?.auto;


if(!auto){

document.getElementById(
"loading"
).innerHTML=
"No stream";

return;

}


const found=

auto.match(
/https.*(240|360|480|540|720|1080)p\.m3u8[^\n]*/i
);


if(!found){

document.getElementById(
"loading"
).innerHTML=
"Stream unavailable";

return;

}


let stream=
found[0];


// PROXY + INDEX

stream=

stream

.replace(
/https:\/\/.*?\/mumbai\//,
PROXY_URL+
"/mumbai/"
)

.replace(
/\/(240|360|480|540|720|1080)p\.m3u8/i,
"/index.m3u8"
);


document
.getElementById(
"loading"
)
.style.display=
"none";


document
.getElementById(
"player"
)
.style.display=
"block";


// APPLE

const isApple=

/iPad|iPhone|iPod|Macintosh/i
.test(
navigator.userAgent
)

&&

video.canPlayType(
"application/vnd.apple.mpegurl"
);


// APPLE NATIVE

if(isApple){

video.src=
stream;

video.play()
.catch(()=>{});

}


// OTHERS = JW

else{

jwplayer(
"player"
)

.setup({

file:stream,

type:"hls",

width:"100%",

height:"100%",

autostart:true,

mute:false,

stretching:"uniform",

primary:"html5"

});

}


})

.catch(()=>{

document
.getElementById(
"loading"
)
.innerHTML=

"Unable to detect location";

});

},2000);

</script>

</body>
</html>

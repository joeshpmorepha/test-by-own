<!DOCTYPE html>
<html lang="en">

<head>

<title>Famcode - Matches</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<meta name="referrer" content="no-referrer"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>

<style>

html,
body{
margin:0;
padding:0;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

video{
width:100%;
height:100%;
max-width:100%;
display:none;
}

.plyr{
height:100%;
}

.loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#fff;
z-index:9999;
}

.loader{
width:45px;
height:45px;
border:4px solid #333;
border-top:4px solid red;
border-radius:50%;
margin:auto;
margin-bottom:15px;
animation:spin .9s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.small{
font-size:13px;
color:#aaa;
margin-top:8px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.popupbox{
width:90%;
max-width:340px;
background:#171717;
padding:25px;
border-radius:18px;
text-align:center;
}

.btn{
display:block;
padding:13px;
background:red;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div
id="loading"
class="loading">

<div class="loader"></div>

<div>
Checking location...
</div>

<div class="small">
Preparing player
</div>

</div>


<video
id="player"
autoplay
muted
controls
crossorigin
playsinline>
</video>


<script src="proxyurl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>

<script>

const params=
new URLSearchParams(
window.location.search
);

const id=
params.get("id");

const video=
document.getElementById(
"player"
);

const loading=
document.getElementById(
"loading"
);


// EXACT OLD DETECTION

setTimeout(()=>{

fetch(
"https://ipapi.co/json/?t="+Date.now()
)

.then(r=>r.json())

.then(async geo=>{

const country=
(
geo.country_code||""
)
.toUpperCase();

console.log(
"Country:",
country
);


// INDIA

if(country==="IN"){

document.body.innerHTML=`

<div class="popup">

<div class="popupbox">

<h2>

Your location is India

</h2>

<p class="small">

Use Indian Users Button

</p>

<a
href="javascript:history.back()"
class="btn">

Watch Now - Indian Users

</a>

</div>

</div>

`;

return;

}


// WORLD PLAYER

const matchId=
id.split("_")[0];

const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const json=
await res.json();

const match=
json.matches.find(
m=>
String(m.match_id)===matchId
);

if(!match){

loading.innerHTML=
"Match not found";

return;

}

const auto=
match?.auto_streams?.[0]?.auto;

if(!auto){

loading.innerHTML=
"No stream";

return;

}


const found=
auto.match(
/https.*(240|360|480|540|720|1080)p\.m3u8[^\n]*/i
);

if(!found){

loading.innerHTML=
"Stream unavailable";

return;

}

let source=
found[0].trim();

source=

source

.replace(
/https:\/\/[^/]+\/mumbai/i,
`${PROXY_URL}/mumbai`
)

.replace(
/\/(240|360|480|540|720|1080)p\.m3u8/i,
"/index.m3u8"
);


loading.style.display=
"none";

video.style.display=
"block";


// PLAYER

if(Hls.isSupported()){

const hls=
new Hls({
maxMaxBufferLength:100
});

hls.loadSource(
source
);

hls.attachMedia(
video
);

hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

const availableQualities=
hls.levels.map(
l=>l.height
);

new Plyr(
video,
{

controls:[
'play-large',
'play',
'mute',
'volume',
'settings',
'fullscreen'
],

quality:{

default:
availableQualities[0],

options:
availableQualities,

forced:true,

onChange:
quality=>{

hls.levels.forEach(
(level,index)=>{

if(level.height===quality){

hls.currentLevel=index;

}

});

}

}

}

);

}

);

}

else if(

video.canPlayType(
'application/vnd.apple.mpegurl'
)

){

video.src=
source;

new Plyr(video);

}

})


// fallback if api fails

.catch(error=>{

console.log(
error
);

// assume non-india if api fails

location.reload();

});

},2000);

</script>
</body>
</html>

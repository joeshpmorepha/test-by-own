<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Worldwide Player</title>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<meta
name="referrer"
content="no-referrer"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>

<script src="proxyurl.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#playerWrap{
width:100%;
height:100%;
display:none;
}

video{
width:100%;
height:100%;
background:#000;
}

.plyr{
height:100%;
}

.loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.loader{
width:44px;
height:44px;
border:4px solid #333;
border-top:4px solid red;
border-radius:50%;
margin:auto;
margin-bottom:15px;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.small{
font-size:13px;
color:#aaa;
margin-top:8px;
}

</style>

</head>

<body>


<div
id="loading"
class="loading">

<div class="loader"></div>

<div>
Checking location...
</div>

<div class="small">
Preparing player
</div>

</div>



<div id="playerWrap">

<video
id="player"
autoplay
muted
controls
crossorigin
playsinline>
</video>

</div>


<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>

<script>

const params=
new URLSearchParams(
location.search
);

const id=
params.get("id");

const video=
document.getElementById(
"player"
);

const loading=
document.getElementById(
"loading"
);


// OLD DETECTION

setTimeout(()=>{

fetch(
"https://ipapi.co/json/?t="+Date.now()
)

.then(
r=>r.json()
)

.then(
async geo=>{

const country=
(
geo.country_code||
""
)
.toUpperCase();


// INDIA

if(country==="IN"){

document.body.innerHTML=`

<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
">

<div style="
background:#171717;
padding:25px;
width:90%;
max-width:340px;
border-radius:20px;
text-align:center;
">

<h2>
Your location is India
</h2>

<p style="color:#aaa">
Use Indian Users Button
</p>

<a
href="javascript:history.back()"

style="
display:block;
margin-top:20px;
background:red;
padding:14px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
">

Watch Now - Indian Users

</a>

</div>

</div>
`;

return;

}


// JSON

const matchId=
id.split("_")[0];


const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const json=
await res.json();


const match=
json.matches.find(
m=>
String(
m.match_id
)
===matchId
);


const auto=
match?.auto_streams?.[0]?.auto;

if(!auto){

loading.innerHTML=
"No Stream";

return;

}


// FIND STREAM

const found=

auto.match(
/https:\/\/[^\n]+?(240|360|480|540|720|1080)p\.m3u8[^\n]*/i
);


if(!found){

loading.innerHTML=
"Stream unavailable";

return;

}


let stream=
found[0].trim();


// INDEX

stream=
stream.replace(
/(240|360|480|540|720|1080)p\.m3u8/i,
"index.m3u8"
);


// PROXY

stream=
stream.replace(
/https:\/\/[^/]+\/mumbai/i,
PROXY_URL+"/mumbai"
);


loading.style.display=
"none";

document
.getElementById(
"playerWrap"
)
.style.display=
"block";


// APPLE

if(
video.canPlayType(
'application/vnd.apple.mpegurl'
)
){

video.src=
stream;

new Plyr(video);

return;

}


// HLS

if(Hls.isSupported()){

const hls=
new Hls({
maxMaxBufferLength:100
});

hls.loadSource(
stream
);

hls.attachMedia(
video
);


hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

const availableQualities=

hls.levels.map(
level=>level.height
);

new Plyr(
video,
{

controls:[

'play-large',
'play',
'mute',
'volume',
'settings',
'fullscreen'

],

quality:{

default:
availableQualities[0],

options:
availableQualities,

forced:true,

onChange:
quality=>{

hls.levels.forEach(
(level,index)=>{

if(
level.height===quality
){

hls.currentLevel=index;

}

});

}

}

}

);

});

}

})

.catch(()=>{

loading.innerHTML=
"Unable to detect location";

});

},2000);

</script>

</body>
</html>

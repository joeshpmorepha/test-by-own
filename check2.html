<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Worldwide Player
</title>

<script src="proxyurl.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow:hidden;
}

video{
width:100%;
height:100vh;
background:black;
display:none;
}

#msg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
color:white;
text-align:center;
z-index:999;
}

.loader{

width:42px;
height:42px;

border:
4px solid #333;

border-top:
4px solid red;

border-radius:50%;

margin:auto;
margin-bottom:15px;

animation:
spin .9s linear infinite;

}

@keyframes spin{

100%{
transform:
rotate(360deg);
}

}

.small{
font-size:13px;
color:#aaa;
margin-top:10px;
}

</style>

</head>

<body>

<div id="msg">

<div class="loader"></div>

<div>
Checking location...
</div>

<div class="small">
Preparing player
</div>

</div>


<video
id="video"
controls
autoplay
playsinline>
</video>


<script>

const params=
new URLSearchParams(
location.search
);

const id=
params.get("id");

const video=
document.getElementById(
"video"
);

const msg=
document.getElementById(
"msg"
);


// KEEP OLD WORKING FLOW

setTimeout(()=>{


fetch(
"https://ipapi.co/json/?t="+Date.now(),
{
cache:"no-store"
}
)

.then(r=>r.json())

.then(async geo=>{

const country=
(
geo.country_code||
""
)
.toUpperCase();

console.log(
"Country:",
country
);


// INDIA POPUP

if(country==="IN"){

document.body.innerHTML=`

<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
width:90%;
max-width:350px;
background:#171717;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,.3);
">

<h2 style="
font-size:24px;
margin-bottom:15px;
">

Your location is India

</h2>

<p style="
color:#aaa;
margin-bottom:25px;
">

Use Indian stream player

</p>

<a

href="javascript:history.back()"

style="
display:block;
background:#ff0000;
padding:14px;
border-radius:12px;
color:white;
font-size:18px;
text-decoration:none;
font-weight:bold;
">

Watch Now - Indian Users

</a>

</div>

</div>

`;

return;

}


// WORLD PLAYER

const matchId=
id.split("_")[0];


const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const data=
await res.json();


const match=
data.matches.find(
m=>

String(
m.match_id
)

===matchId

);


let url=

match
.auto_streams?.[0]
?.auto
.match(
/https.*1080p\.m3u8/
)?.[0];


url=

url

.replace(
/https:\/\/.*?\/mumbai\//,
PROXY_URL+"/mumbai/"
)

.replace(
"1080p.m3u8",
"index.m3u8"
);


msg.style.display=
"none";

video.style.display=
"block";


if (Hls.isSupported()) {

const hls = new Hls({
maxMaxBufferLength:100
});

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

const availableQualities=
hls.levels.map(
level=>level.height
);

const defaultQuality=
availableQualities[0];

new Plyr(
video,
{
controls:[
'play-large',
'play',
'mute',
'volume',
'settings',
'fullscreen'
],

quality:{
default:defaultQuality,

options:availableQualities,

forced:true,

onChange:(quality)=>{

hls.levels.forEach(
(level,levelIndex)=>{

if(
level.height===quality
){

hls.currentLevel=
levelIndex;

}

});

}

}

}
);


// IMPORTANT
hls.attachMedia(video);
hls.loadSource(url);

document.addEventListener(
'fullscreenchange',
()=>{

if(
document.fullscreenElement
){

if(
screen.orientation &&
screen.orientation.lock
){

screen.orientation
.lock('landscape')
.catch(()=>{});

}

}else{

if(
screen.orientation &&
screen.orientation.unlock
){

screen.orientation
.unlock()
.catch(()=>{});

}

}

});

});

} else if (

video.canPlayType(
'application/vnd.apple.mpegurl'
)

){

video.src=url;

new Plyr(video);

}else{

document.body.innerHTML=
'<p style="color:white;text-align:center">Browser does not support HLS playback.</p>';

}

})

.catch(()=>{

msg.innerHTML=
"Unable to detect location";

});

},2000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Worldwide Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
}

video{
width:100%;
height:100vh;
}

#msg{
padding:20px;
text-align:center;
font-size:20px;
}

</style>

</head>

<body>

<div id="msg">
Checking location...
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

<script>

const params=
new URLSearchParams(
location.search
);

const id=
params.get("id");

const video=
document.getElementById(
"video"
);

const msg=
document.getElementById(
"msg"
);


fetch(
"https://ipapi.co/json/"
)

.then(r=>r.json())

.then(async geo=>{

const country=
(
geo.country_code||
""
)
.toUpperCase();


if(
country==="IN"
){

msg.innerHTML=
`
Your location is India.<br><br>

Use:

Watch Now - Indian Users
`;

return;

}


const matchId=
id.split("_")[0];


const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);

const data=
await res.json();


const match=
data.matches.find(
m=>

String(
m.match_id
)

===matchId

);


let url=
match.auto_streams[0]
.auto.match(
/https.*1080p\.m3u8/
)?.[0];


url=
url
.replace(
/https:\/\/.*?\/mumbai\//,
"https://proxy.camily.in/mumbai/"
)
.replace(
"1080p.m3u8",
"index.m3u8"
);


msg.style.display=
"none";


if(Hls.isSupported()){

const hls=
new Hls();

hls.loadSource(
url
);

hls.attachMedia(
video
);

}else{

video.src=url;

}

});

</script>

</body>
</html>

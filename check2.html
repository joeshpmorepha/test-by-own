<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<title>Famcode - Matches</title>
<meta
name="referrer"
content="no-referrer"/>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>
<script src="proxyurl.js"></script>
<style>
html,body{
margin:0;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

video{
width:100%;
height:100%;
display:none;
}

.loading{
position:fixed;
top:50%;
left:50%;
transform:
translate(-50%,-50%);
text-align:center;
color:white;
z-index:9999;
}

.loader{
width:45px;
height:45px;
border:
4px solid #333;
border-top:
4px solid red;
border-radius:50%;
margin:auto;
margin-bottom:15px;
animation:
spin .9s linear infinite;
}

@keyframes spin{
100%{
transform:
rotate(360deg);
}
}
  
.small{
font-size:14px;
color:#aaa;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.popupbox{
width:90%;
max-width:340px;
background:#171717;
padding:25px;
border-radius:18px;
text-align:center;
}

.btn{
display:block;
padding:13px;
background:red;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}
</style>
</head>
<body>
<div
id="loading"
class="loading">
<div class="loader"></div>
<div>
Checking location...
</div>
<div class="small">
Preparing player
</div>
</div>
<video
id="player"
autoplay
controls
playsinline
crossorigin>
</video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
<script>
const params=
new URLSearchParams(
location.search
);
const id=
params.get("id");
const video=
document.getElementById(
"player"
);
const loading=
document.getElementById(
"loading"
);

// delay

setTimeout(()=>{
fetch(
"https://ipapi.co/json/"
)
.then(
r=>r.json()
)
.then(
async geo=>{

const country=
(
geo.country_code||
""
)
.toUpperCase();

// INDIA
if(
country==="IN"
){
document.body.innerHTML=`
<div class="popup">
<div class="popupbox">
<h2>
Your location is India
</h2>
<p class="small">
Use Indian Users Button
</p>
<a
href="javascript:history.back()"
class="btn">
Watch Now - Indian Users
</a>
</div>
</div>
`;
return;
}


// WORLD
const matchId=
id.split("_")[0];
const res=
await fetch(
"https://famcode.lchd-football.workers.dev/"
);
const data=
await res.json();
const match=
data.matches.find(
m=>
String(
m.match_id
)
===matchId
);

let url=
match
.auto_streams?.[0]
?.auto
.match(
/https.*1080p\.m3u8/
)?.[0];
url=
url
.replace(
/https:\/\/.*?\/mumbai\//,
PROXY_URL+
"/mumbai/"
)
.replace(
"1080p.m3u8",
"index.m3u8"
);
loading.style.display=
"none";
video.style.display=
"block";
if(
Hls.isSupported()
){
const hls=
new Hls({
maxMaxBufferLength:100
});
hls.loadSource(
url
);
hls.attachMedia(
video
);
hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{
const qualities=
hls.levels
.map(
l=>l.height
);

new Plyr(
video,
{
controls:[
'play-large',
'play',
'mute',
'volume',
'settings',
'fullscreen'
],

quality:{
default:
qualities[0],
options:
qualities,
forced:true,
onChange:
quality=>{
hls.levels
.forEach(
(level,index)=>{

if(
level.height===quality
){
hls.currentLevel=index;
}
});
}
}
}
);
}
);
}
else{
video.src=url;
new Plyr(video);
}
})
.catch(()=>{
loading.innerHTML=`
<div>
Unable to detect location
</div>
`;
});
},2000);
</script>
</body>
</html>

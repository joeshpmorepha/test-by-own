<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Fancode</title>

<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: #000;
  overflow: hidden; /* 🚫 no scroll */
}

/* Fullscreen container */
.video-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
}

/* Player container */
.shaka-video-container {
  width: 100%;
  height: 100%;
}

/* Video fit fix */
video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* ✅ IMPORTANT */
  background: #000;
}
</style>

</head>

<body>

<div class="shaka-video-container">
    <video id="video" autoplay playsinline preload="auto" class="shaka-video"></video>
  </div>
</div>

<script>
const queryParams = new URLSearchParams(window.location.search);
const url = queryParams.get('url');

const channelstreamInfo = {
  streamUrl: url,
  authBearer: "",
  streamPoster: ""
};

let player;
const video = document.getElementById('video');

async function initializePlayer() {
  try {
    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    const config = {
      addSeekBar: false,
      controlPanelElements: [
        'play_pause',
        'time_and_duration',
        'spacer',
        'fullscreen'
      ]
    };

    ui.configure(config);

    player.configure({
      streaming:{
        bufferingGoal:10,
        rebufferingGoal:2,
        bufferBehind:30
      },
      manifest:{
        retryParameters:{
          timeout:30000,
          maxAttempts:2,
          baseDelay:1000,
          backoffFactor:2,
          fuzzFactor:0.5
        }
      }
    });

    video.autoplay = true;
    video.controls = false;
    video.volume = 1;
    video.muted = false;
    video.preload = 'auto';

    await player.load(channelstreamInfo.streamUrl);

    const attemptAutoplay = async () => {
      try {
        await video.play();
      } catch {
        video.muted = true;
        await video.play();
      }
    };

    if (video.readyState >= 2) {
      await attemptAutoplay();
    } else {
      video.addEventListener('canplay', attemptAutoplay, { once: true });
    }

  } catch (error) {
    video.src = channelstreamInfo.streamUrl;
    video.autoplay = true;
    video.muted = false;

    try {
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initializePlayer();
});
</script>
</body>
</html>

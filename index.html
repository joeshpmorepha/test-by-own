<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<title>Fancode Live</title>

<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="referrer" content="no-referrer">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:#fff;
}

.match-card{
background:linear-gradient(145deg,#1a1a1a,#222);
transition:.3s;
}

.match-card:hover{
transform:translateY(-5px);
}

.live-badge{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,0,0,.7);}
70%{box-shadow:0 0 0 10px rgba(255,0,0,0);}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-5">

<h1 class="text-4xl font-bold text-center mb-8">
Fancode Live
</h1>

<div
id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>

</div>

<script>

const container=
document.getElementById(
"matches-container"
);

const DATA_URL=
"https://famcode.lchd-football.workers.dev/";

const OLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check";

const WORLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check2";


// =====================
// GEO
// =====================

async function detectCountry(){

try{

const response=
await fetch(
"https://ipapi.co/json/?"+Date.now(),
{
cache:"no-store"
}
);

const data=
await response.json();

console.log(
"GEO:",
data
);

const country=
String(
data.country||
""
)
.trim()
.toUpperCase();

const code=
String(
data.country_code||
""
)
.trim()
.toUpperCase();

if(
country==="IN"
||
code==="IN"
){
return true;
}

return false;

}

catch{

return true;

}

}



// =====================
// BUTTON
// =====================

function makeBtn(
label,
href
){

const a=
document.createElement(
"a"
);

a.href=href;

a.target="_blank";

a.className=
`
px-4
py-2
bg-red-600
hover:bg-red-700
rounded-lg
text-white
shadow-md
flex
items-center
justify-center
min-w-[120px]
`;

a.innerHTML=
`
<i class="fas fa-play mr-2"></i>
${label}
`;

return a;

}



// =====================
// LOAD
// =====================

async function loadMatches(
isIndia
){

container.innerHTML="";

const res=
await fetch(
DATA_URL
);

const data=
await res.json();

const matches=
data.matches||[];


matches.forEach(
match=>{

const isLive=

(match.status||"")
.toUpperCase()==="LIVE"

||

(match.streamingStatus||"")
.toUpperCase()==="STARTED";


const card=
document.createElement(
"div"
);

card.className=
`
match-card
rounded-2xl
overflow-hidden
shadow-xl
border
border-gray-800
`;


const img=

match.image||

"https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";


const body=
document.createElement(
"div"
);

body.className=
"p-5";


body.innerHTML=
`

<div class="relative">

<img
src="${img}"
class="
w-full
h-60
rounded-xl
object-cover
">

${
isLive
?
`
<span
class="
absolute
top-3
left-3
bg-red-600
px-3
py-1
rounded-full
text-xs
live-badge
">
LIVE
</span>
`
:""
}

</div>

<h2 class="text-xl font-semibold mt-4">
${match.title||"Match"}
</h2>

<p class="text-gray-400 text-sm mt-1">
${match.tournament||""}
</p>

<p class="text-gray-500 text-sm mt-2">
${match.startTime||""}
</p>

<p class="text-gray-500 text-sm mt-2">
${match.language||""}
</p>

`;


if(isLive){

const toggle=
document.createElement(
"button"
);

toggle.className=
`
w-full
bg-gradient-to-r
from-orange-600
to-red-600
text-white
py-2
rounded-lg
mt-4
`;

toggle.innerHTML=
`
<i class="fas fa-tv mr-2"></i>
Watch Now
`;


const btnWrap=
document.createElement(
"div"
);

btnWrap.className=
`
hidden
flex
flex-wrap
justify-center
gap-3
mt-4
`;



if(isIndia){

const master=
match.auto_streams?.[0]?.auto||"";

const qualities=
[
...master.matchAll(
/(\d+)p\.m3u8/g
)
];

qualities.forEach(
q=>{

const quality=
q[1];

btnWrap.appendChild(

makeBtn(
quality+"p",
`${OLD_PLAYER}?id=${match.match_id}_${match.language}&q=${quality}`
)

);

});

}

else{

btnWrap.appendChild(

makeBtn(
"Watch Now",
`${WORLD_PLAYER}?id=${match.match_id}_${match.language}`
)

);

}


toggle.onclick=()=>{

btnWrap.classList.toggle(
"hidden"
);

};

body.appendChild(
toggle
);

body.appendChild(
btnWrap
);

}

else{

body.innerHTML+=`
<div class="
w-full
bg-gray-800
text-gray-400
rounded-lg
mt-4
py-2
text-center
">
<i class="fas fa-clock mr-2"></i>
No stream available yet
</div>
`;

}

card.appendChild(body);

container.appendChild(card);

});

}


// =====================
// START
// =====================

(async()=>{

const isIndia=
await detectCountry();

console.log(
"INDIA MODE:",
isIndia
);

loadMatches(
isIndia
);

})();

</script>

</body>
</html>

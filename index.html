<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Famcode - Matches</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:#fff;
}

.match-card{
transition:.3s;
background:linear-gradient(145deg,#1a1a1a,#1f1f1f);
}

.match-card:hover{
transform:translateY(-6px);
box-shadow:0 25px 35px rgba(0,0,0,.45);
}

.live-badge{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{
box-shadow:0 0 0 0 rgba(239,68,68,.7);
}
50%{
box-shadow:0 0 15px 10px rgba(239,68,68,0);
}
}

.match-img{
transition:transform .3s;
}

.match-card:hover .match-img{
transform:scale(1.03);
}

</style>
</head>

<body class="bg-gray-950 min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8 sm:py-10">

<h1 class="text-3xl sm:text-4xl font-bold text-center text-white mb-8 tracking-wide">
Fancode Live
</h1>

<div
id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>

</div>

<script>

const container=
document.getElementById(
"matches-container"
);

const DATA_URL=
"https://famcode.lchd-football.workers.dev/";

const OLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check";

const WORLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check2";



function makeBtn(
label,
href
){

const a=
document.createElement(
"a"
);

a.href=href;

a.target="_blank";

a.className=
"w-full h-14 rounded-xl text-lg flex items-center justify-center shadow-md transition-all bg-red-600 hover:bg-red-700 text-white";

a.innerHTML=
`
<i class="fas fa-play mr-2"></i>
${label}
`;

return a;

}



async function loadMatches(){

const res=
await fetch(
DATA_URL
);

const data=
await res.json();

let matches=
data.matches||[];



matches.sort(
(a,b)=>{

const aLive=
(a.status||"").toUpperCase()==="LIVE"||
(a.streamingStatus||"").toUpperCase()==="STARTED";

const bLive=
(b.status||"").toUpperCase()==="LIVE"||
(b.streamingStatus||"").toUpperCase()==="STARTED";

return(
bLive?1:0
)-
(
aLive?1:0
);

}
);



matches.forEach(
match=>{

const isLive=

(match.status||"")
.toUpperCase()==="LIVE"

||

(match.streamingStatus||"")
.toUpperCase()==="STARTED";



const card=
document.createElement(
"div"
);


card.className=
`rounded-2xl overflow-hidden shadow-xl match-card border border-gray-800 ${isLive?"ring-2 ring-red-600":""}`;


const imgSrc=
match.image||
"https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";


const headerHTML=`

<div class="relative">

<img
src="${imgSrc}"
class="w-full h-48 sm:h-60 md:h-64 lg:h-72 object-cover object-top match-img">

${isLive?
`<span class="absolute top-3 left-3 bg-red-600 text-white text-xs font-semibold px-3 py-1 rounded-full shadow-md live-badge">
LIVE
</span>`
:""}

</div>

`;



const body=
document.createElement(
"div"
);

body.className=
"p-5 sm:p-6";


body.innerHTML=`

<h2 class="text-xl sm:text-2xl font-semibold text-white mb-1">

${match.title||"Match"}

</h2>

<p class="text-gray-400 text-sm mb-1">

${match.tournament||""}

</p>

<p class="text-sm text-gray-500 mb-2">

${match.startTime||""}

</p>

<p class="text-sm text-gray-500 mb-3">

${match.language||"ENGLISH"}

</p>

`;



if(isLive){

const qualityWrap=
document.createElement(
"div"
);

qualityWrap.className=
"flex flex-col gap-4 hidden mt-4";



const indiaBtn=
document.createElement(
"button"
);

indiaBtn.className=
"w-full bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-semibold py-2 px-4 rounded-lg mt-3";

indiaBtn.innerHTML=
`<i class="fas fa-tv mr-2"></i>Watch Now - Indian Users`;



indiaBtn.onclick=
()=>{

qualityWrap.classList.toggle(
"hidden"
);

};



const worldBtn=
document.createElement(
"a"
);

worldBtn.href=
`${WORLD_PLAYER}?id=${match.match_id}_${match.language}`;

worldBtn.target=
"_blank";

worldBtn.className=
"w-full mt-3 block text-center bg-gray-800 hover:bg-gray-700 text-white font-semibold py-3 px-4 rounded-lg";

worldBtn.innerHTML=
`<i class="fas fa-globe mr-2"></i>Watch Now - Worldwide`;



const master=
match.auto_streams?.[0]?.auto||"";

const qualities=
[
...new Set(
[...master.matchAll(
/(\d+)p\.m3u8/g
)]
.map(
x=>x[1]
)
)
];



qualities.forEach(
q=>{

qualityWrap.appendChild(

makeBtn(

q+"p",

`${OLD_PLAYER}?id=${match.match_id}_${match.language}&q=${q}`

)

);

});



body.appendChild(
indiaBtn
);

body.appendChild(
qualityWrap
);

body.appendChild(
worldBtn
);

}

else{

const noStream=
document.createElement(
"div"
);

noStream.className=
"w-full bg-gray-800 text-gray-400 py-2 px-4 rounded-lg mt-3 text-center";

noStream.innerHTML=
`<i class="fas fa-clock mr-2"></i>No stream available yet`;

body.appendChild(
noStream
);

}



card.innerHTML=
headerHTML;

card.appendChild(
body
);

container.appendChild(
card
);

});

}

loadMatches();

</script>

</body>
</html>

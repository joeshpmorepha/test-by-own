<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fancode Live</title>

<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:#fff;
}

.match-card{
background:linear-gradient(145deg,#1a1a1a,#222);
transition:.3s;
}

.match-card:hover{
transform:translateY(-5px);
}

.live-badge{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,0,0,.7);}
70%{box-shadow:0 0 0 10px rgba(255,0,0,0);}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-5">

<h1 class="text-4xl font-bold text-center mb-8">
Fancode Live
</h1>

<div
id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>

</div>

<script>

const container=
document.getElementById(
"matches-container"
);

const DATA_URL=
"https://famcode.lchd-football.workers.dev/";

const OLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check";

const WORLD_PLAYER=
"https://joeshpmorepha.github.io/test-by-own/check2";


function makeBtn(
label,
href
){

const a=
document.createElement(
"a"
);

a.href=href;

a.target="_blank";

a.className=
`
px-4
py-2
bg-red-600
hover:bg-red-700
rounded-lg
text-white
shadow-md
flex
items-center
justify-center
text-sm
`;

a.innerHTML=
`
<i class="fas fa-play mr-2"></i>
${label}
`;

return a;

}


async function loadMatches(){

const res=
await fetch(DATA_URL);

const data=
await res.json();

const matches=
data.matches||[];


matches.forEach(
match=>{

const isLive=

(match.status||"")
.toUpperCase()==="LIVE"

||

(match.streamingStatus||"")
.toUpperCase()==="STARTED";


const card=
document.createElement(
"div"
);

card.className=
`
match-card
rounded-2xl
overflow-hidden
shadow-xl
border
border-gray-800
`;


const body=
document.createElement(
"div"
);

body.className=
"p-5";


body.innerHTML=`

<img
src="${match.image}"
class="
w-full
h-56
object-cover
rounded-xl
">

<h2 class="text-xl font-semibold mt-4">
${match.title}
</h2>

<p class="text-gray-400 text-sm">
${match.tournament||""}
</p>

<p class="text-gray-500 text-sm mt-2">
${match.startTime||""}
</p>

<p class="text-gray-500 text-sm mt-2">
${match.language||""}
</p>

`;


if(isLive){

const qualityWrap=
document.createElement(
"div"
);

qualityWrap.className=
`
hidden
flex
flex-wrap
gap-3
mt-4
justify-center
`;

const indiaBtn=
document.createElement(
"button"
);

indiaBtn.className=
`
w-full
bg-red-600
py-2
rounded-lg
mt-4
`;

indiaBtn.innerText=
"Watch Now - Indian Users";


indiaBtn.onclick=()=>{

qualityWrap.classList.toggle(
"hidden"
);

};


const worldBtn=
makeBtn(
"Watch Now - Worldwide Users",
`${WORLD_PLAYER}?id=${match.match_id}_${match.language}`
);

worldBtn.style.marginTop=
"10px";



const master=
match.auto_streams?.[0]?.auto||"";

const qualities=
[
...master.matchAll(
/(\d+)p\.m3u8/g
)
];


qualities.forEach(
q=>{

const quality=q[1];

qualityWrap.appendChild(

makeBtn(

quality+"p",

`${OLD_PLAYER}?id=${match.match_id}_${match.language}&q=${quality}`

)

);

});


body.appendChild(
indiaBtn
);

body.appendChild(
qualityWrap
);

body.appendChild(
worldBtn
);

}

else{

body.innerHTML+=`

<div class="
w-full
bg-gray-800
text-gray-400
rounded-lg
mt-4
py-2
text-center
">

No stream available yet

</div>

`;

}

card.appendChild(
body
);

container.appendChild(
card
);

});

}

loadMatches();

</script>

</body>
</html>

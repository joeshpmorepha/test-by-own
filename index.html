<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<title>Fancode Live</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:#fff;
}

.match-card{
transition:.3s;
background:linear-gradient(145deg,#1a1a1a,#1f1f1f);
}

.match-card:hover{
transform:translateY(-6px);
box-shadow:0 25px 35px rgba(0,0,0,.45);
}

.live-badge{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{
box-shadow:0 0 0 0 rgba(239,68,68,.7);
}
50%{
box-shadow:0 0 15px 10px rgba(239,68,68,0);
}
}

.match-img{
transition:.3s;
}

.match-card:hover .match-img{
transform:scale(1.03);
}

</style>

</head>

<body class="bg-gray-950 min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">

<h1 class="text-4xl font-bold text-center mb-8">
Fancode Live
</h1>

<div
id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>

</div>

<script>

const container =
document.getElementById(
"matches-container"
);

const DATA_URL =
"https://famcode.lchd-football.workers.dev/";

const OLD_PLAYER =
"https://joeshpmorepha.github.io/test-by-own/check";

const WORLD_PLAYER =
"https://joeshpmorepha.github.io/test-by-own/check2";

let USER_COUNTRY="IN";


// =========================
// COUNTRY DETECTION
// =========================

async function getCountry(){

try{

const r=
await fetch(
"https://ipapi.co/json/?nocache="+Date.now(),
{
cache:"no-store"
}
);

const j=
await r.json();

USER_COUNTRY=
j.country_code || "IN";

console.log(
"Country:",
USER_COUNTRY
);

}

catch{

USER_COUNTRY="IN";

}

}


// =========================
// BUTTON
// =========================

function makeBtn(
label,
href
){

const a=
document.createElement(
"a"
);

a.href=href;

a.target="_blank";

a.className=
"px-5 py-3 min-w-[140px] rounded-xl text-lg flex items-center justify-center shadow-md bg-red-600 hover:bg-red-700 text-white";

a.innerHTML=
`<i class="fas fa-play mr-3"></i>${label}`;

return a;

}


// =========================
// LOAD MATCHES
// =========================

async function loadMatches(){

container.innerHTML="";

const response=
await fetch(DATA_URL);

const data=
await response.json();

const matches=
data.matches || [];

matches.forEach(match=>{

const isLive=

(match.status||"")
.toUpperCase()==="LIVE"

||

(match.streamingStatus||"")
.toUpperCase()==="STARTED";


const card=
document.createElement(
"div"
);

card.className=
"rounded-2xl overflow-hidden shadow-xl match-card border border-gray-800";


const img=

match.image ||

"https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";


const btnWrap=
document.createElement(
"div"
);


// compact layout

btnWrap.className=
"flex flex-wrap gap-4 hidden mt-4 justify-center";


// =========================
// BUTTONS
// =========================

if(

isLive &&

match.auto_streams &&

match.auto_streams.length

){

const lang=

(match.language||"ENGLISH")
.toUpperCase();


// INDIA

if(
USER_COUNTRY==="IN"
){

const master=
match.auto_streams[0].auto;

const qualities=
[
...master.matchAll(
/(\d+)p\.m3u8/g
)
];

qualities.forEach(
q=>{

const quality=
q[1];

const href=
`${OLD_PLAYER}?id=${match.match_id}_${lang}&q=${quality}`;

btnWrap.appendChild(

makeBtn(
`${quality}p`,
href
)

);

});

}


// WORLD

else{

const href=
`${WORLD_PLAYER}?id=${match.match_id}_${lang}`;

btnWrap.appendChild(

makeBtn(
"Watch Now",
href
)

);

}

}


// =========================
// BODY
// =========================

const body=
document.createElement(
"div"
);

body.className=
"p-5";

body.innerHTML=`

<div class="relative">

<img
src="${img}"
class="w-full h-60 object-cover rounded-xl match-img">

${
isLive ?

`<span class="absolute top-3 left-3 bg-red-600 text-white text-xs font-semibold px-3 py-1 rounded-full live-badge">

LIVE

</span>`

:

""

}

</div>

<h2 class="text-xl font-semibold mt-4">

${match.title || "Match"}

</h2>

<p class="text-gray-400 text-sm mt-1">

${match.tournament || ""}

</p>

<p class="text-gray-500 text-sm mt-2">

${match.startTime || ""}

</p>

<p class="text-gray-500 text-sm mt-2">

${match.language || ""}

</p>

`;

if(isLive){

const toggleBtn=
document.createElement(
"button"
);

toggleBtn.className=
"w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-semibold py-2 px-4 rounded-lg mt-4";

toggleBtn.innerHTML=
`<i class="fas fa-tv mr-2"></i> Watch Now`;

toggleBtn.onclick=()=>{

btnWrap.classList.toggle(
"hidden"
);

};

body.appendChild(
toggleBtn
);

body.appendChild(
btnWrap
);

}

else{

const noStream=
document.createElement(
"div"
);

noStream.className=
"w-full bg-gray-800 text-gray-400 py-2 px-4 rounded-lg mt-4 text-center";

noStream.innerHTML=
`<i class="fas fa-clock mr-2"></i>No stream available yet`;

body.appendChild(
noStream
);

}

card.appendChild(
body);

container.appendChild(
card);

});

}


// =========================
// START
// =========================

(async()=>{

await getCountry();

await loadMatches();

})();

</script>

</body>
</html>
